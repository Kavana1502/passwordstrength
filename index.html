<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Strength Checker</title>
<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #1f1c2c, #928dab);
}

.container{
    background:#111;
    padding:40px;
    width:300px;
    border-radius:15px;
    text-align:left;
    box-shadow:0 0 20px rgba(0,0,0,0.6);
}

h2{
    color:white;
    margin-top:20px;
    letter-spacing:2px;
    text-align:center;

}

input{
    width:70%;
    padding:10px;
    border-radius:25px;
    border:2px solid #444;
    background:#1e1e1e;
    color:white;
    font-size:14px;
    outline:none;
    transition:0.3s;
}

input:focus{
    border-color:#00f5ff;
    box-shadow:0 0 10px #00f5ff;
}

#message{
    margin-top:20px;
    font-weight:bold;
    font-size:16px;
    text-align:center;
    border-radius:25px;
    
}
</style>
</head>
<body>
    <h2>password strength Checker</h2>
    <input type="password" id="password" placeholder="Enetr password" onkeyup="checkpassword()"> 
    <h3 id="message"></h3>

    <script>
        function checkpassword(){
            let pwd=document.getElementById("password").value;
            let message=document.getElementById("message");

            if(pwd.length==0){
                message.innerText="";

            }else if(pwd.length<5){
                message.innerText="weak password";
                message.style.color="red";

            }else if(pwd.length>=5 && pwd.length<8){
                message.innerText="medium password";
                message.style.color="orange";
            }else{
                message.innerText="strong password";
                message.style.color="green";
            }
        }
    </script>

</body>
</html>
